{# Filter form on /admin/cfp-review/schedule-items #}
<form method="get" class="row">
    <fieldset class="form-horizontal col-md-8">
        <div class="form-group">
            <label for="state" class="col-sm-2">State</label>
            <div class="col-sm-10">
                <select id="state" name="state" multiple class="form-control">
                    {% for state in schedule_item_states %}
                        <option value="{{state}}"
                            {%-if state in request.args.getlist('state') %}
                                selected
                            {%-endif %}
                        >{{state}}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="type" class="col-sm-2">Type</label>
            <div class="col-sm-10">
                <select id="type" name="type" multiple class="form-control">
                    {% for type_info in SCHEDULE_ITEM_INFOS.values() %}
                        <option value="{{ type_info.type }}"
                            {%-if type_info.type in request.args.getlist('type') %}
                                selected
                            {%-endif %}
                        >{{ type_info.human_type }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="type" class="col-sm-2">Official content</label>
            <div class="col-sm-10">
                <select id="official_content" name="official_content" multiple class="form-control">
                    {% for value, label in [["any", "Any"], ["official", "Official only"], ["attendee", "Attendee only"]] %}
                        <option value="{{ value }}"
                            {%-if request.args.getlist('official_content') == value %}
                                selected
                            {%-endif %}
                        >{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </fieldset>

    <fieldset class="form-horizontal col-md-4">
        <div class="form-group">
            <div class="checkbox">
                <label>
                    <input name="no_occurrence" type="checkbox" value="True"
                            {%- if request.args.get('no_occurrence', False) %}checked{% endif %}>
                    No occurrences
                </label>
            </div>
        </div>
        <div class="form-group">
            <div class="checkbox">
                <label>
                    <input name="no_duration" type="checkbox" value="True"
                            {%- if request.args.get('no_duration', False) %}checked{% endif %}>
                    No duration set
                </label>
            </div>
        </div>
    </fieldset>

    <fieldset class="col-md-12">
        <div class="form-group">
            <div class="btn-group pull-right">
                <button class="btn btn-primary">Apply</button>
                <a href="{{url_for('.schedule_items')}}" class="btn btn-default">Clear</a>
            </div>
        </div>
    </fieldset>
</form>
