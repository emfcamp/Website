{% extends "base.html" %}
{% block title %}Workshop Steward{% endblock %}
{% block body %}

<h1>Workshop Steward</h1>

<h2>Workshops</h2>

<ul>
  {% for venue in workshop_venues %}
    <li>
      <a href="{{ url_for('.workshop_steward_venue', venue_id=venue.id) }}">{{ venue.name }}</a>
      {% if venue.village %}
      ({{ venue.village.name }})
      {% endif %}
    </li>
  {% endfor %}
</ul>

{% endblock %}
