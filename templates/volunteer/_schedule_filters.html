{# Filter form on /volunteer/schedule #}
<div class="panel panel-default" id="roles" style="display: none">
    <div class="panel-heading" id="roles-toggle">
        <h2 class="panel-title">
            <span class="title"><strong>Roles:</strong> <span id="role-list"></span></span>
             | <span class="toggle"><a href="#">Edit</a></span>
        </h2>
    </div>
    <div class="panel-body" id="roles-body" style="display: none">
        {% for r in roles %}
            <div class="role-selector">
                <input
                    type="checkbox"
                    class="role"
                    id="role-{{r.id}}"
                    data-role-id="{{ r.id }}"
                    data-trained="{{ r.is_trained }}"
                    data-interested="{{ r.is_interested }}"
                    data-owned="{{ r.id in owned_roles }}"
                />
                <label for="role-{{r.id}}" id="role-{{r.id}}-label">{{ r.name }}</label>
            </div>
        {% endfor %}
        <hr />
        <p>
            <strong>Select:</strong>
            <a class="checkbox-filter" href="#" id="select-all-roles">All</a>
            <a class="checkbox-filter" href="#" id="select-no-roles">None</a>
            <a class="checkbox-filter" href="#" id="select-interested-roles">Roles I'm interested in</a>
            <a class="checkbox-filter" href="#" id="select-trained-roles">Roles I'm trained for</a>
            <a class="checkbox-filter" href="#" id="select-owned-roles">Roles I'm admin for</a>
         </p>
    </div>
</div>

<div class="panel panel-default" id="filters" style="display: none">
    <div class="panel-heading" id="filters-toggle">
        <h2 class="panel-title">
            <span class="title">Filters</span>
            <span class="toggle"><a href="#">Toggle</a></span>
        </h2>
    </div>
    <div class="panel-body" id="filters-body" style="display: none">
        <div class="form-group form-inline">
            <h3>Filters</h3>
            <label class="checkbox">
                <input
                    type="checkbox"
                    id="show_past"
                />
                Show shifts in the past
            </label>
            <label class="checkbox">
                <input
                    type="checkbox"
                    id="show_signed_up_only"
                />
                Show my shifts
            </label>
            <label class="checkbox">
                <input
                    type="checkbox"
                    id="hide_full"
                    checked
                />
                Hide full shifts
            </label>
            <label class="checkbox">
                <input
                    type="checkbox"
                    id="is_understaffed"
                />
                Hide sufficiently staffed shifts
            </label>
            <label class="checkbox" title="Hides any shifts that you can't sign up for because they're at the same time as another volunteer shift">
                <input
                    type="checkbox"
                    id="hide_conflicting"
                    checked
                />
                Hide conflicting shifts
            </label>
        </div>
    </div>
</div>
