name: Runner
description: Perform odd jobs around the site
full_description_md: |
  Runners cover the assorted tasks that come up during the event, early on this will likely be focused on going round plugging peoples power and network cables in to the DKs as they arrive. Once things have settled down you can expect to do tasks such as swapping full bins for empty ones, restocking the toilets with supplies, litter picking, and running errands for other teams.

  You'll need to be reasonably mobile as this role requires a lot of walking around the site and some lifting.
