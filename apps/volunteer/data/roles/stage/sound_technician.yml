name: "Sound Technician - Performances"
description: ""
full_description_md: |
  Sound technicians assist the sound operator and stage crew in micing up bands and performers, doing sound checks, and live mixing.

  **Some experience/familiarisation with the equipment is required. Training sessions will be available at 1pm daily on Stage D, attendance is required if you have not operated sound equipment recently and are also a great opportunity to learn more about live event production.**
