name: "Sound/Lighting Operator - Talks"
description: Operate the sound and lighting systems
full_description_md: |
  The sound & lighting operators on our stages make sure speakers look and sound great, both in person and when recordings are watched online. You'll be working with the rest of the stage team to adjust audio levels, and switch lighting states at the beginning and end of talks.

  They also keep an eye on the stage, making sure seating is set out as expected, escape routes are clear, and any issues get communicated to the wider stage team to be resolved.

  **Some experience/familiarisation with the equipment is required. Training sessions will be available at 1pm daily on Stage D, attendance is required if you have not operated lighting/sound equipment recently and are also a great opportunity to learn more about live event production.**
