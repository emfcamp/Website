name: Bar
description: ""
full_description_md: |
  The bar team are running several bars at EMF, the main bar near Stage B, and the Null Sector bars.

  Serving your fellow festival-goers and working with a team of volunteers in the fast paced environment behind the bar is a great way to meet new people and socialise, it doesn't really feel like work at all.

  It's a great way to learn how to work on a bar and get experience if you ever fancy a career change! We'll teach you everything you need to know on the job, it's really easy once you get started.

  Working behind the bar is loads of fun, it's not hard work, and without lovely people like you we'd have no bar, so volunteer for a shift or two, or even three!

  **For legal reasons you must be over 18 and complete [this short online course](https://www.emfcamp.org/volunteer/bar-training) before starting a shift.**
over_18_only: true
requires_training: true
