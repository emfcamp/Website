name: Info & Help Desk
description: ""
full_description_md: |
  Be a point of contact for attendees. Either helping with issues or just getting an idea for what's on.

  The information desk is the first place people come to with questions, or problems that need solving. You'll be working with experienced team members who'll be able to help with anything you don't know, and by the end of a shift you'll know a lot more about EMF works than you did going in.
